<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBX Timelines</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <div class="max-w-7xl mx-auto p-8 text-gray-100 relative">
        
        <div id="error-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm hidden">
            <div class="bg-gray-800 border-2 border-red-500/30 rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4 text-center">
                <div class="w-12 h-12 bg-red-500/10 text-red-400 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
                    </svg>
                </div>
                <h3 id="error-modal-title" class="text-lg font-bold text-white mb-2"></h3>
                <p id="error-modal-message" class="text-gray-400 text-sm mb-6"></p>
                <button type="button" id="close-modal-btn" class="w-full bg-red-600 hover:bg-red-500 text-white font-semibold py-2 px-4 rounded transition-colors duration-150">
                    Acknowledge
                </button>
            </div>
        </div>
        
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center space-x-4">
                <svg class="rounded-xl shadow-md border border-gray-700 bg-gradient-to-br from-blue-600 via-indigo-700 to-purple-800" width="56" height="56" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="4 6"/>
                    <path d="M 25,25 Q 45,75 75,75" fill="none" stroke="#67e8f9" stroke-width="4" stroke-linecap="round"/>
                    <rect x="42" y="34" width="24" height="24" rx="4" fill="#ffffff" transform="rotate(18 54 46)" opacity="0.95"/>
                    <rect x="50" y="42" width="8" height="8" fill="#1e1b4b" transform="rotate(18 54 46)"/>
                </svg>
                <div>
                    <h1 class="text-3xl font-bold text-white tracking-tight">RBX Timelines</h1>
                    <p class="text-gray-400 text-sm">Real-time multiplayer account tracking matrix.</p>
                </div>
            </div>
            <div class="bg-gray-800 border border-gray-700 px-4 py-2 rounded-lg flex items-center space-x-2 text-xs font-mono">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-gray-400">Max Trackable ID:</span>
                <span id="live-id-badge" class="text-emerald-400 font-bold">Fetching...</span>
            </div>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg shadow-xl border border-gray-700 mb-8">
            <h2 class="text-xl font-bold text-white mb-4">Add Account</h2>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 items-start">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Username</label>
                        <input type="text" id="form-account" placeholder="e.g. RobloxPlayer1" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Display Name</label>
                        <input type="text" id="form-display" placeholder="e.g. JustAUser" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-400 uppercase mb-1">Account ID</label>
                        <input type="text" id="form-id" oninput="this.value = this.value.replace(/[^0-9]/g, '');" placeholder="e.g. 1039222732" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-blue-500">
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Date Selection</h3>
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="block text-[10px] text-gray-500 uppercase mb-1">Year</label>
                            <select id="form-year" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-blue-500 cursor-pointer"></select>
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-500 uppercase mb-1">Month</label>
                            <select id="form-month" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-blue-500 cursor-pointer" disabled>
                                <option value="">Select Year First</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] text-gray-500 uppercase mb-1">Day</label>
                            <select id="form-day" class="w-full bg-gray-900 border border-gray-700 rounded p-2 text-white focus:outline-none focus:border-blue-500 cursor-pointer" disabled>
                                <option value="">Select Month First</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="space-y-2 lg:col-span-2">
                    <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Time Selection</h3>
                    
                    <div class="flex items-end justify-center space-x-2 bg-gray-900 p-2 rounded-lg border border-gray-700 h-[64px] max-w-[260px] mx-auto lg:mx-0">
                        
                        <div class="flex flex-col items-center">
                            <span class="text-[9px] text-gray-500 font-semibold uppercase mb-0.5 select-none tracking-tight">hrs</span>
                            <input type="text" id="input-hour" value="12" maxlength="2" class="w-10 bg-gray-800 border border-gray-700 rounded text-center text-sm font-mono font-bold text-blue-400 focus:outline-none focus:border-blue-500 p-1">
                        </div>
                        <span class="text-gray-600 font-bold select-none pb-1.5">:</span>

                        <div class="flex flex-col items-center">
                            <span class="text-[9px] text-gray-500 font-semibold uppercase mb-0.5 select-none tracking-tight">min</span>
                            <input type="text" id="input-minute" value="00" maxlength="2" class="w-10 bg-gray-800 border border-gray-700 rounded text-center text-sm font-mono font-bold text-blue-400 focus:outline-none focus:border-blue-500 p-1">
                        </div>
                        <span class="text-gray-600 font-bold select-none pb-1.5">:</span>

                        <div class="flex flex-col items-center">
                            <span class="text-[9px] text-gray-500 font-semibold uppercase mb-0.5 select-none tracking-tight">sec</span>
                            <input type="text" id="input-second" value="00" maxlength="2" class="w-10 bg-gray-800 border border-gray-700 rounded text-center text-sm font-mono font-bold text-blue-400 focus:outline-none focus:border-blue-500 p-1">
                        </div>

                        <div class="flex items-center space-x-1 pl-2 border-l border-gray-700 h-[34px] mb-0.5">
                            <button type="button" id="ampm-am" class="px-2 py-1 text-[10px] font-bold rounded bg-blue-600 text-white transition-colors duration-150">AM</button>
                            <button type="button" id="ampm-pm" class="px-2 py-1 text-[10px] font-bold rounded bg-gray-800 text-gray-400 hover:bg-gray-700 transition-colors duration-150">PM</button>
                        </div>
                    </div>
                </div>

                <div class="md:col-span-2 lg:col-span-4 flex justify-end">
                    <button type="button" id="submit-btn" disabled class="w-full md:w-64 bg-gray-700 text-gray-500 font-semibold py-2.5 px-4 rounded transition-colors duration-150 shadow-none cursor-not-allowed">Save Entry</button>
                </div>
            </div>
        </div>

        <div class="overflow-x-auto bg-gray-800 rounded-lg shadow-xl border border-gray-700">
            <table class="min-w-full divide-y divide-gray-700 text-left text-sm">
                <thead class="bg-gray-800 text-gray-300 uppercase text-xs font-semibold tracking-wider">
                    <tr>
                        <th class="px-6 py-4">Username</th>
                        <th class="px-6 py-4">Display Name</th>
                        <th class="px-6 py-4">Join Date</th>
                        <th class="px-6 py-4">Account Age</th>
                        <th class="px-6 py-4">Account ID</th>
                        <th class="px-6 py-4 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-gray-700 bg-gray-900/50"></tbody>
            </table>
        </div>
    </div>

    <script>
        let accountDataMap = JSON.parse(localStorage.getItem('rbx_timeline_data')) || {};
        let maxTrackableId = 8200000000; 
        let activeAmPm = "AM";
        let isEditingTableCell = false;

        const MIN_TRACKABLE_ID = 16;
        const MIN_JOIN_DATE = new Date(2005, 4, 22);

        const locales = {
            "en-US": {
                malfunctionTitle: "Data Malfunction",
                pastError: "Oh, changin' the past now, are we? Unfortunately, Roblox was released on May 22nd, 2005. Nice try.",
                futureError: "Time Travel Detected. Please refrain from destabilizing the Space-Time Continuum. Thank You.",
                exceedError: (parsed, max) => `Anachronism Warning! The Account ID ${parsed} does not exist yet. Maximum allowable index is ${max}.`,
                minIdError: (parsed) => `Invalid ID! Account IDs must be at least ${MIN_TRACKABLE_ID}. The value entered (${parsed}) is not permitted.`,
                violationError: (parsed, max) => `Timeline Violation! The ID entered (${parsed}) exceeds the limit of ${max}. Reverting value.`,
            }
        };

        const submitBtnEnabledClass = "w-full md:w-64 bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 px-4 rounded transition-colors duration-150 shadow-md cursor-pointer";
        const submitBtnDisabledClass = "w-full md:w-64 bg-gray-700 text-gray-500 font-semibold py-2.5 px-4 rounded transition-colors duration-150 shadow-none cursor-not-allowed";

        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        function getLang() { return locales["en-US"]; }
        function saveToLocalStorage() { localStorage.setItem('rbx_timeline_data', JSON.stringify(accountDataMap)); }

        function getMaxJoinDate() {
            return new Date();
        }

        function isValidJoinDate(date) {
            return date >= MIN_JOIN_DATE && date <= getMaxJoinDate();
        }

        function isValidAccountId(id) {
            return id >= MIN_TRACKABLE_ID && id <= maxTrackableId;
        }

        function getFormDateTime() {
            const year = document.getElementById('form-year').value;
            const month = document.getElementById('form-month').value;
            const day = document.getElementById('form-day').value;
            const hRaw = document.getElementById('input-hour').value;
            const mRaw = document.getElementById('input-minute').value;
            const sRaw = document.getElementById('input-second').value;

            if (!year || !month || !day || hRaw === '--' || mRaw === '--' || sRaw === '--') {
                return null;
            }

            let h = parseInt(hRaw, 10);
            let m = parseInt(mRaw, 10);
            let s = parseInt(sRaw, 10);

            if (isNaN(h) || isNaN(m) || isNaN(s)) return null;
            if (h < 1 || h > 12 || m < 0 || m > 59 || s < 0 || s > 59) return null;

            if (activeAmPm === "PM" && h < 12) h += 12;
            if (activeAmPm === "AM" && h === 12) h = 0;

            const combinedDateTimeString = `${year}-${month}-${day}T${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
            const chosenDate = new Date(combinedDateTimeString);
            return isNaN(chosenDate.getTime()) ? null : chosenDate;
        }

        function isFormValid() {
            const account = document.getElementById('form-account').value.trim();
            const display = document.getElementById('form-display').value.trim();
            const idStr = document.getElementById('form-id').value.trim();

            if (!account || !display || !idStr) return false;

            const inputIdParsed = parseInt(idStr, 10);
            if (!isValidAccountId(inputIdParsed)) return false;

            const chosenDate = getFormDateTime();
            if (!chosenDate || !isValidJoinDate(chosenDate)) return false;

            return true;
        }

        function updateSubmitButtonState() {
            const btn = document.getElementById('submit-btn');
            const valid = isFormValid();
            btn.disabled = !valid;
            btn.className = valid ? submitBtnEnabledClass : submitBtnDisabledClass;
        }

        function showErrorModal(messageHTML, title) {
            document.getElementById('error-modal-title').innerText = title;
            document.getElementById('error-modal-message').innerHTML = messageHTML;
            document.getElementById('error-modal').classList.remove('hidden');
        }

        document.getElementById('close-modal-btn').addEventListener('click', function() {
            document.getElementById('error-modal').classList.add('hidden');
        });

        function bindTimeValidations(inputId, limit) {
            const element = document.getElementById(inputId);
            
            element.addEventListener('focus', function() {
                if (this.value === '--') {
                    this.value = '';
                }
            });

            element.addEventListener('input', function() {
                this.value = this.value.replace(/[^0-9]/g, '');
                updateSubmitButtonState();
            });

            element.addEventListener('blur', function() {
                let currentNum = parseInt(this.value, 10);
                if (this.value.trim() === '' || isNaN(currentNum) || currentNum > limit) {
                    this.value = "--";
                } else {
                    this.value = String(currentNum).padStart(2, '0');
                }
                updateSubmitButtonState();
            });
        }

        bindTimeValidations('input-hour', 12);
        bindTimeValidations('input-minute', 59);
        bindTimeValidations('input-second', 59);

        function initDateDropdowns() {
            const yearSelect = document.getElementById('form-year');
            const currentYear = new Date().getFullYear();
            yearSelect.innerHTML = '<option value="">Year</option>';
            for (let y = currentYear; y >= 2005; y--) {
                yearSelect.insertAdjacentHTML('beforeend', `<option value="${y}">${y}</option>`);
            }
        }

        function populateMonthDropdown(year, selectedMonth) {
            const monthSelect = document.getElementById('form-month');
            if (!year) {
                monthSelect.innerHTML = '<option value="">Select Year First</option>';
                monthSelect.disabled = true;
                return;
            }
            monthSelect.innerHTML = '<option value="">Month</option>';
            const yearNum = parseInt(year, 10);
            const now = new Date();
            const minMonth = yearNum === 2005 ? 5 : 1;
            const maxMonth = yearNum === now.getFullYear() ? now.getMonth() + 1 : 12;
            monthNames.forEach((name, idx) => {
                const monthNum = idx + 1;
                if (monthNum < minMonth || monthNum > maxMonth) return;
                const val = String(monthNum).padStart(2, '0');
                monthSelect.insertAdjacentHTML('beforeend', `<option value="${val}">${name}</option>`);
            });
            monthSelect.disabled = false;
            if (selectedMonth) monthSelect.value = selectedMonth;
        }

        function populateDayDropdown(year, month, selectedDay) {
            const daySelect = document.getElementById('form-day');
            if (!year || !month) {
                daySelect.innerHTML = '<option value="">Select Month First</option>';
                daySelect.disabled = true;
                return;
            }
            daySelect.innerHTML = '<option value="">Day</option>';
            const yearNum = parseInt(year, 10);
            const monthNum = parseInt(month, 10);
            const now = new Date();
            let minDay = 1;
            let maxDay = new Date(yearNum, monthNum, 0).getDate();
            if (yearNum === 2005 && monthNum === 5) minDay = 22;
            if (yearNum === now.getFullYear() && monthNum === now.getMonth() + 1) maxDay = now.getDate();
            for (let d = minDay; d <= maxDay; d++) {
                const val = String(d).padStart(2, '0');
                daySelect.insertAdjacentHTML('beforeend', `<option value="${val}">${d}</option>`);
            }
            daySelect.disabled = false;
            if (selectedDay) daySelect.value = selectedDay;
        }

        function setDefaultDateToToday() {
            const now = new Date();
            const year = String(now.getFullYear());
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');

            document.getElementById('form-year').value = year;
            populateMonthDropdown(year, month);
            populateDayDropdown(year, month, day);
        }

        function setDefaultTimeToMidnight() {
            document.getElementById('input-hour').value = '12';
            document.getElementById('input-minute').value = '00';
            document.getElementById('input-second').value = '00';
            activeAmPm = "AM";
            document.getElementById('ampm-am').className = "px-2 py-1 text-[10px] font-bold rounded bg-blue-600 text-white transition-colors duration-150";
            document.getElementById('ampm-pm').className = "px-2 py-1 text-[10px] font-bold rounded bg-gray-800 text-gray-400 hover:bg-gray-700 transition-colors duration-150";
        }

        function resetFormDefaults() {
            document.getElementById('form-account').value = '';
            document.getElementById('form-display').value = '';
            document.getElementById('form-id').value = '';
            setDefaultDateToToday();
            setDefaultTimeToMidnight();
            updateSubmitButtonState();
        }

        document.getElementById('form-year').addEventListener('change', function() {
            const year = this.value;
            populateMonthDropdown(year, '');
            populateDayDropdown('', '', '');
            updateSubmitButtonState();
        });

        document.getElementById('form-month').addEventListener('change', function() {
            const year = document.getElementById('form-year').value;
            const month = this.value;
            populateDayDropdown(year, month, '');
            updateSubmitButtonState();
        });

        document.getElementById('form-day').addEventListener('change', updateSubmitButtonState);

        ['form-account', 'form-display', 'form-id'].forEach(function(id) {
            document.getElementById(id).addEventListener('input', updateSubmitButtonState);
        });

        document.getElementById('ampm-am').addEventListener('click', function() {
            activeAmPm = "AM";
            this.className = "px-2 py-1 text-[10px] font-bold rounded bg-blue-600 text-white transition-colors duration-150";
            document.getElementById('ampm-pm').className = "px-2 py-1 text-[10px] font-bold rounded bg-gray-800 text-gray-400 hover:bg-gray-700 transition-colors duration-150";
            updateSubmitButtonState();
        });
        document.getElementById('ampm-pm').addEventListener('click', function() {
            activeAmPm = "PM";
            this.className = "px-2 py-1 text-[10px] font-bold rounded bg-blue-600 text-white transition-colors duration-150";
            document.getElementById('ampm-am').className = "px-2 py-1 text-[10px] font-bold rounded bg-gray-800 text-gray-400 hover:bg-gray-700 transition-colors duration-150";
            updateSubmitButtonState();
        });

        function updateEstimatedMaxId() {
            const standardBaselineDate = new Date("2024-01-01").getTime();
            const dynamicIdDelta = Math.floor((Date.now() - standardBaselineDate) * 35 / 1000);
            maxTrackableId = 7500000000 + dynamicIdDelta;
            document.getElementById('live-id-badge').innerText = maxTrackableId.toLocaleString();
            updateSubmitButtonState();
        }

        function calculateAge(joinDateString) {
            const joinDate = new Date(joinDateString);
            const now = new Date();
            let years = now.getFullYear() - joinDate.getFullYear();
            let months = now.getMonth() - joinDate.getMonth();
            let days = now.getDate() - joinDate.getDate();
            let hours = now.getHours() - joinDate.getHours();
            let minutes = now.getMinutes() - joinDate.getMinutes();
            let seconds = now.getSeconds() - joinDate.getSeconds();

            if (seconds < 0) { minutes--; seconds += 60; }
            if (minutes < 0) { hours--; minutes += 60; }
            if (hours < 0) { days--; hours += 24; }
            if (days < 0) { months--; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
            if (months < 0) { years--; months += 12; }

            const segments = [];
            if (years > 0) segments.push(`${years} yr${years > 1 ? 's' : ''}`);
            if (months > 0) segments.push(`${months} mo`);
            if (days > 0) segments.push(`${days} d`);
            if (hours > 0) segments.push(`${hours} h`);
            if (minutes > 0) segments.push(`${minutes} m`);
            if (seconds > 0) segments.push(`${seconds} s`);

            return segments.length === 0 ? "Just joined" : segments.join(', ');
        }

        function renderTable() {
            if (isEditingTableCell) return;

            const tableBody = document.getElementById('table-body');
            tableBody.innerHTML = ''; 
            const sortedItems = Object.keys(accountDataMap).map(k => ({ localKey: k, ...accountDataMap[k] })).sort((a, b) => new Date(a.joinDate) - new Date(b.joinDate));
            const formatter = new Intl.DateTimeFormat(navigator.language || "en-US", { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' });

            sortedItems.forEach((item) => {
                tableBody.insertAdjacentHTML('beforeend', `
                    <tr class="hover:bg-gray-800/50 transition-colors duration-150">
                        <td data-key="${item.localKey}" data-field="account" contenteditable="true" class="edit-cell px-6 py-4 font-medium text-white focus:bg-gray-700/50 focus:outline-none rounded cursor-pointer">${item.account}</td>
                        <td data-key="${item.localKey}" data-field="display" contenteditable="true" class="edit-cell px-6 py-4 text-gray-300 focus:bg-gray-700/50 focus:outline-none rounded cursor-pointer">${item.display}</td>
                        <td class="px-6 py-4 text-gray-400 select-none">${formatter.format(new Date(item.joinDate))}</td>
                        <td class="px-6 py-4 text-amber-400 font-mono text-xs select-none">${calculateAge(item.joinDate)}</td>
                        <td data-key="${item.localKey}" data-field="id" contenteditable="true" class="edit-cell px-6 py-4 text-gray-500 font-mono focus:bg-gray-700/50 focus:outline-none rounded cursor-pointer">${item.id}</td>
                        <td class="px-6 py-4 text-center select-none">
                            <button type="button" data-key="${item.localKey}" class="delete-btn text-red-400 hover:text-red-300 font-bold bg-red-500/10 hover:bg-red-500/20 px-2.5 py-1 rounded text-xs">Delete</button>
                        </td>
                    </tr>
                `);
            });
        }

        function saveEditCell(cell) {
            const localKey = cell.getAttribute('data-key');
            const field = cell.getAttribute('data-field');
            const newValue = cell.innerText.trim();
            const currentLg = getLang();
            if (!newValue || !accountDataMap[localKey]) return true;

            if (field === 'id') {
                const parsedId = parseInt(newValue.replace(/[^0-9]/g, ''), 10);
                if (!parsedId || parsedId < MIN_TRACKABLE_ID) {
                    showErrorModal(currentLg.minIdError((parsedId || 0).toLocaleString()), "Timeline Violation");
                    cell.innerText = accountDataMap[localKey].id;
                    return false;
                }
                if (parsedId > maxTrackableId) {
                    showErrorModal(currentLg.violationError(parsedId.toLocaleString(), maxTrackableId.toLocaleString()), "Timeline Violation");
                    cell.innerText = accountDataMap[localKey].id;
                    return false;
                }
                accountDataMap[localKey].id = parsedId;
            } else {
                accountDataMap[localKey][field] = newValue;
            }
            saveToLocalStorage();
            return true;
        }

        document.addEventListener('focusin', function(e) {
            if (e.target && e.target.classList.contains('edit-cell')) {
                isEditingTableCell = true;
            }
        }, true);

        document.addEventListener('focusout', function(e) {
            if (e.target && e.target.classList.contains('edit-cell')) {
                setTimeout(function() {
                    const active = document.activeElement;
                    if (!active || !active.classList.contains('edit-cell')) {
                        isEditingTableCell = false;
                        renderTable();
                    }
                }, 0);
            }
        }, true);

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target && e.target.classList.contains('edit-cell')) {
                e.preventDefault();
                if (saveEditCell(e.target)) {
                    e.target.blur();
                }
            }
        }, true);

        document.addEventListener('blur', function(e) {
            if (e.target && e.target.classList.contains('edit-cell')) {
                saveEditCell(e.target);
            }
        }, true);

        document.addEventListener('click', function(e) {
            if(e.target && e.target.classList.contains('delete-btn')) {
                const localKey = e.target.getAttribute('data-key');
                if (confirm("Are you sure you want to delete this entry?")) {
                    delete accountDataMap[localKey];
                    saveToLocalStorage();
                    renderTable();
                }
            }
        });

        document.getElementById('submit-btn').addEventListener('click', function() {
            if (this.disabled) return;

            const accountInput = document.getElementById('form-account');
            const displayInput = document.getElementById('form-display');
            const idInput = document.getElementById('form-id');
            const year = document.getElementById('form-year').value;
            const month = document.getElementById('form-month').value;
            const day = document.getElementById('form-day').value;
            const currentLg = getLang();

            const chosenDate = getFormDateTime();
            const inputIdParsed = parseInt(idInput.value, 10);
            const chronosText = "Chronos Directive Violation Detected";

            if (!chosenDate || !isValidJoinDate(chosenDate)) return;

            const cleanHour = String(chosenDate.getHours()).padStart(2, '0');
            const cleanMinute = String(chosenDate.getMinutes()).padStart(2, '0');
            const cleanSecond = String(chosenDate.getSeconds()).padStart(2, '0');
            const combinedDateTimeString = `${year}-${month}-${day}T${cleanHour}:${cleanMinute}:${cleanSecond}`;

            if (chosenDate < MIN_JOIN_DATE) { showErrorModal(currentLg.pastError, chronosText); return; }
            if (chosenDate > getMaxJoinDate()) { showErrorModal(currentLg.futureError, chronosText); return; }
            if (inputIdParsed < MIN_TRACKABLE_ID) { showErrorModal(currentLg.minIdError(inputIdParsed.toLocaleString()), currentLg.malfunctionTitle); return; }
            if (inputIdParsed > maxTrackableId) { showErrorModal(currentLg.exceedError(inputIdParsed.toLocaleString(), maxTrackableId.toLocaleString()), currentLg.malfunctionTitle); return; }

            const localKey = 'id_' + Date.now();
            accountDataMap[localKey] = { account: accountInput.value, display: displayInput.value, joinDate: combinedDateTimeString, id: idInput.value };

            saveToLocalStorage();
            renderTable();
            resetFormDefaults();
        });

        initDateDropdowns();
        setDefaultDateToToday();
        setDefaultTimeToMidnight();
        updateSubmitButtonState();
        updateEstimatedMaxId();
        renderTable();
        setInterval(updateEstimatedMaxId, 2000);
        setInterval(renderTable, 1000);
    </script>
</body>
</html>
